<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artists — Ink Flow Tattoo</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>

  <div data-site-nav data-active="artists"></div>

  <div class="page-content">
    <section class="page-hero">
      <div class="container">
        <div class="breadcrumb"><a href="index.html">Home</a> / Artists</div>
        <h1>Our Artists</h1>
        <p>30+ artists across all styles — matched with the right artist for your tattoo. Every time.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="artist-grid" id="artist-grid"></div>
      </div>
    </section>

    <section class="cta-strip">
      <h2>Found your artist?</h2>
      <a href="contact.html" class="btn-talk">Talk to Our Team</a>
    </section>
  </div>

  <div data-site-footer></div>
  <div data-site-float></div>

  <script src="js/main.js"></script>
  <script src="js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var grid = document.getElementById('artist-grid');
      if (!grid || typeof ARTISTS === 'undefined') return;
      grid.innerHTML = ARTISTS.map(function (a) {
        var tags = a.tags.map(function (t) { return '<span class="artist-tag">' + t + '</span>'; }).join('');
        var portfolio = a.portfolio.map(function (url) {
          return '<img src="' + url + '" alt="' + a.name + ' portfolio" loading="lazy">';
        }).join('');
        return '<div class="artist-card"><div class="artist-card-layout">' +
          '<div class="artist-photo"><img src="' + a.photo + '" alt="' + a.name + '" loading="lazy"></div>' +
          '<div class="artist-info"><h2 class="artist-name">' + a.name + '</h2>' +
          '<p class="artist-specialty">' + a.specialty + '</p>' +
          '<div class="artist-meta"><span>' + a.experience + '</span><span>' + a.sessions + ' sessions</span></div>' +
          '<p class="artist-bio">' + a.bio + '</p><div class="artist-tags">' + tags + '</div>' +
          '<div class="artist-portfolio-mini">' + portfolio + '</div>' +
          '<a href="contact.html" class="btn btn-primary btn-sm">Talk to Our Team</a></div></div></div>';
      }).join('');
    });
  </script>
</body>
</html>
