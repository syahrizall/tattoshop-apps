<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery — Ink Flow Tattoo</title>
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/site.css">
</head>
<body>

  <div data-site-nav data-active="gallery"></div>

  <div class="page-content">
    <section class="page-hero">
      <div class="container">
        <div class="breadcrumb"><a href="index.html">Home</a> / Gallery</div>
        <h1>Tattoo Gallery</h1>
        <p>Seeing is believing — real work from our artists. Filter by style.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="style-filters" id="gallery-page-filters"></div>
        <div class="gallery-grid" id="gallery-grid"></div>
      </div>
    </section>
  </div>

  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close">×</button>
    <button class="lightbox-nav prev" id="lightbox-prev">‹</button>
    <img id="lightbox-img" src="" alt="">
    <button class="lightbox-nav next" id="lightbox-next">›</button>
  </div>

  <div data-site-footer></div>
  <div data-site-float></div>

  <script src="js/main.js"></script>
  <script src="js/layout.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function () {
      var filtersEl = document.getElementById('gallery-page-filters');
      if (filtersEl && typeof GALLERY_FILTERS !== 'undefined') {
        filtersEl.innerHTML = GALLERY_FILTERS.map(function (f, i) {
          return '<button class="filter-pill' + (i === 0 ? ' active' : '') + '" data-filter="' + f.id + '">' + f.label + '</button>';
        }).join('');
      }
      var grid = document.getElementById('gallery-grid');
      if (grid && typeof GALLERY_ITEMS !== 'undefined') {
        grid.innerHTML = GALLERY_ITEMS.map(function (item) {
          return '<div class="gallery-item" data-category="' + item.category + '">' +
            '<img src="' + item.image + '" alt="' + item.title + '" loading="lazy">' +
            '<div class="gallery-item-overlay"><span>' + item.caption + '</span></div></div>';
        }).join('');
      }
    });
  </script>
  <script src="js/gallery.js"></script>
</body>
</html>
